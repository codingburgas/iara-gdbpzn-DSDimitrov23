<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИАРА - Контролен панел</title>
    <style>
        :root { --navy: #1a2a6c; --blue: #2980b9; --light: #f8f9fa; --accent: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--light); }
        
        .sidebar { width: 250px; height: 100vh; background: var(--navy); color: white; position: fixed; padding-top: 20px; }
        .sidebar h2 { text-align: center; color: var(--accent); margin-bottom: 30px; }
        .sidebar a { display: block; color: white; padding: 15px 25px; text-decoration: none; border-left: 4px solid transparent; transition: 0.3s; }
        .sidebar a:hover { background: rgba(255,255,255,0.1); border-left: 4px solid var(--accent); }
        
        .main-content { margin-left: 250px; padding: 30px; width: calc(100% - 250px); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
        
        .search-box { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .input-group { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
        button { padding: 12px 25px; background: var(--blue); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: var(--navy); }
        #res { margin-top: 20px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>⚓ ИАРА</h2>
        <a href="#">📊 Табло за управление</a>
        <a href="#">🚢 Регистър на кораби</a>
        <a href="#">🎫 Риболовни билети</a>
        <a href="#">📋 Инспекции</a>
        <a href="#">⚙️ Настройки</a>
    </div>

    <div class="main-content">
        <h1>Контролен панел</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-icon">🚢</span>
                <h3 id="stat-vessels">0</h3>
                <p>Регистрирани кораби</p>
            </div>
            <div class="stat-card">
                <span class="stat-icon">✅</span>
                <h3 id="stat-permits">0</h3>
                <p>Активни разрешителни</p>
            </div>
            <div class="stat-card">
                <span class="stat-icon">🔍</span>
                <h3 id="stat-inspections">0</h3>
                <p>Извършени проверки</p>
            </div>
            <div class="stat-card">
                <span class="stat-icon">👥</span>
                <h3 id="stat-tickets">0</h3>
                <p>Продадени билети</p>
            </div>
        </div>

        <div class="search-box">
            <h3>Бърза проверка на кораб</h3>
            <div class="input-group">
                <input type="text" id="cfrInput" placeholder="Въведете CFR номер (напр. BGR001)">
                <button onclick="verify()">Провери сега</button>
            </div>
            <div id="res"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
