<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IARA Control Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #1a2a6c; --blue: #2980b9; --light: #f8f9fa; --accent: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--light); }
        .sidebar { width: 250px; height: 100vh; background: var(--navy); color: white; position: fixed; padding-top: 20px; }
        .sidebar h2 { text-align: center; color: var(--accent); margin-bottom: 30px; }
        .sidebar a { display: block; color: white; padding: 15px 25px; text-decoration: none; border-left: 4px solid transparent; }
        .sidebar a:hover { background: rgba(255,255,255,0.1); border-left: 4px solid var(--accent); }
        .main-content { margin-left: 250px; padding: 30px; width: 100%; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card i { font-size: 2rem; color: var(--blue); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2><i class="fas fa-anchor"></i> IARA</h2>
        <a href="#"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="#"><i class="fas fa-ship"></i> Vessels</a>
        <a href="#"><i class="fas fa-ticket-alt"></i> Tickets</a>
        <a href="#"><i class="fas fa-clipboard-check"></i> Inspections</a>
    </div>
    <div class="main-content">
        <h1>Control Dashboard</h1>
        <div class="stats-grid" id="stats-container">
            <div class="stat-card"><i class="fas fa-ship"></i><h3 id="stat-vessels">0</h3><p>Vessels</p></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><h3 id="stat-permits">0</h3><p>Active Permits</p></div>
            <div class="stat-card"><i class="fas fa-users"></i><h3 id="stat-tickets">0</h3><p>Tickets Sold</p></div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
